name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (gofmt + go vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Verificar formatação
        run: |
          arquivos_nao_formatados=$(gofmt -l .)
          if [ -n "$arquivos_nao_formatados" ]; then
            echo "Arquivos fora do padrão gofmt:"
            echo "$arquivos_nao_formatados"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Baixar módulos
        run: go mod download

      - name: Executar testes com cobertura
        run: go test -race -coverprofile=cobertura.out -covermode=atomic ./...

      - name: Resumo de cobertura
        run: go tool cover -func=cobertura.out | tail -n 1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cobertura
          path: cobertura.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Compilar binário
        run: |
          CGO_ENABLED=0 GOOS=linux \
          go build -ldflags='-s -w' -o bin/signalhub ./cmd/api

      - uses: actions/upload-artifact@v4
        with:
          name: signalhub-linux-amd64
          path: bin/signalhub
