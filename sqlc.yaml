version: "2"
sql:
  - engine: "postgresql"
    schema: "db/schema"
    queries: "db/queries"
    gen:
      go:
        package: "consultas"
        out: "internal/banco/consultas"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_exact_table_names: false
