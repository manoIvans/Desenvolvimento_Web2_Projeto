# docker-compose.yml
#
# Sobe o PostgreSQL usado pela API SignalHub em desenvolvimento.
# Uso: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: signalhub-postgres
    environment:
      POSTGRES_USER: signalhub
      POSTGRES_PASSWORD: signalhub
      POSTGRES_DB: signalhub
    ports:
      - "5432:5432"
    volumes:
      - signalhub_dados:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalhub -d signalhub"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  signalhub_dados:
